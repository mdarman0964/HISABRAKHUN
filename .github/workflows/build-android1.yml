name: Build Android APK

on:
  push:
    branches:
      - main   # main branch push হলে trigger হবে

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Install Yarn
      - name: Install Yarn
        run: npm install -g yarn

      # 4️⃣ Install Expo CLI & EAS CLI
      - name: Install Expo & EAS CLI
        run: npm install -g expo-cli eas-cli

      # 5️⃣ Install project dependencies
      - name: Install dependencies
        run: yarn install

      # 6️⃣ Login to Expo (secret required)
      - name: Login to Expo
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas login --token $EXPO_TOKEN

      # 7️⃣ Build Android APK (non-interactive)
      - name: Build Android APK
        run: eas build --platform android --profile production --non-interactive

      # 8️⃣ Upload APK as artifact
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./build/android/**/*.apk
